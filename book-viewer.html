<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Future Star™ Executive Guide</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #0d0d0d;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .header {
      background: #1a1a1a;
      padding: 12px 20px;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #f0ede8;
      font-size: 14px;
    }

    .header a {
      color: #c9a84c;
      text-decoration: none;
      margin-left: 20px;
    }

    .header a:hover {
      color: #dfc06a;
    }

    .pdf-container {
      flex: 1;
      overflow: hidden;
      background: #f0f0f0;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <div>AI Future Star™ Executive Guide</div>
    <a href="ai-future-star.html">← Back to Model</a>
  </div>
  <div class="pdf-container">
    <iframe src="assets/Book-AI-Future-Star-Model-full.pdf" allow="none"></iframe>
  </div>

  <script>
    // Disable printing
    document.addEventListener('keydown', function(e) {
      if ((e.ctrlKey || e.metaKey) && e.key === 'p') {
        e.preventDefault();
        alert('Printing is disabled for this document.');
      }
      // Also disable Cmd+S (Save) on Mac and Ctrl+S on Windows
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        alert('Downloading is disabled for this document.');
      }
    });

    // Disable right-click
    document.addEventListener('contextmenu', function(e) {
      e.preventDefault();
      return false;
    });

    // Disable print via menu
    window.print = function() {
      alert('Printing is disabled for this document.');
    };
  </script>
</body>
</html>
